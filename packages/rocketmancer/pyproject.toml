[project]
name = "rocketmancer"
version = "0.1.1"
description = "Multi-stage rocket optimization library"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "jax>=0.7.0",
    "numpy>=2.3.1",
    "pydantic>=2.0.0",
    "scipy>=1.11",
]

[dependency-groups]
dev = [
    "pytest>=7.0.0",
    "rocketmancer",
    "ruff>=0.12.4",
]

[tool.uv.workspace]
members = [
    ".",
]

[tool.uv.sources]
rocketmancer = { workspace = true }
