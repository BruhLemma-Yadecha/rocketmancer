services:
  backend:
    build:
      context: ./backend
    container_name: backend
    command: "gunicorn rocketmancer.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key}
      - DJANGO_ENVIRONMENT=development
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
    ports:
      - "8000:8000"
    networks:
      - rocketmancer-network
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    
    volumes:
      - ./nginx/rocketmancer.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - rocketmancer-network
  
networks:
  rocketmancer-network:
    driver: bridge